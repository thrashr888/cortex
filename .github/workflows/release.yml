name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: cortex-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: cortex-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: cortex-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: cortex-darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz cortex
          cd ../../..
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.sha256

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Compute SHA256 sums
        id: sha
        run: |
          echo "darwin_arm64=$(sha256sum cortex-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum cortex-darwin-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum cortex-linux-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum cortex-linux-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew formula
        uses: thrashr888/homebrew-tap@main
        with:
          formula: cortex
          tag: ${{ github.ref_name }}
          tap-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          darwin-arm64-sha256: ${{ steps.sha.outputs.darwin_arm64 }}
          darwin-amd64-sha256: ${{ steps.sha.outputs.darwin_amd64 }}
          linux-arm64-sha256: ${{ steps.sha.outputs.linux_arm64 }}
          linux-amd64-sha256: ${{ steps.sha.outputs.linux_amd64 }}
          template: |
            class Cortex < Formula
              desc "Systemic and repo-local memory for AI agents"
              homepage "https://github.com/thrashr888/cortex"
              version "${VERSION}"
              license "MIT"

              on_macos do
                on_arm do
                  url "https://github.com/thrashr888/cortex/releases/download/${TAG}/cortex-darwin-arm64.tar.gz"
                  sha256 "${SHA_DARWIN_ARM64}"
                end
                on_intel do
                  url "https://github.com/thrashr888/cortex/releases/download/${TAG}/cortex-darwin-amd64.tar.gz"
                  sha256 "${SHA_DARWIN_AMD64}"
                end
              end

              on_linux do
                on_arm do
                  url "https://github.com/thrashr888/cortex/releases/download/${TAG}/cortex-linux-arm64.tar.gz"
                  sha256 "${SHA_LINUX_ARM64}"
                end
                on_intel do
                  url "https://github.com/thrashr888/cortex/releases/download/${TAG}/cortex-linux-amd64.tar.gz"
                  sha256 "${SHA_LINUX_AMD64}"
                end
              end

              def install
                bin.install "cortex"
              end

              test do
                assert_match "cortex", shell_output("#{bin}/cortex --help")
              end
            end
